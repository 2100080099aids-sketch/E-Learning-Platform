<!DOCTYPE html>
<html>

<head>

<title>Certificate</title>

<style>

body{

    text-align:center;

    font-family:Arial;

    background:#f5f5f5;

}

.certificate{

    width:800px;

    margin:50px auto;

    padding:50px;

    background:white;

    border:10px solid gold;

}

h1{

    color:green;

}

</style>

</head>

<body>

<div class="certificate">

<h1>

🏆 Certificate of Completion

</h1>

<hr>

<p>This certificate is proudly presented to</p>

<h2>

{{ user.username }}

</h2>

<p>

for successfully completing

</p>

<h2>

{{ course.title }}

</h2>

<p>

Progress : {{ progress }}%

</p>

<p>

Congratulations on your achievement!

</p>

</div>

</body>

</html>
